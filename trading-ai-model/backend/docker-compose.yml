version: "3.9"

services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: trading
      POSTGRES_PASSWORD: trading
      POSTGRES_DB: trading_ai
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ./db/migrations/001_market_data.sql:/docker-entrypoint-initdb.d/01_market.sql
      - ./db/migrations/002_trading_signals.sql:/docker-entrypoint-initdb.d/02_signals.sql
      - ./db/migrations/003_news_intelligence_tables.sql:/docker-entrypoint-initdb.d/03_news.sql
      - ./db/migrations/004_confluence_outcomes.sql:/docker-entrypoint-initdb.d/04_outcomes.sql
      - ./db/migrations/005_planner_audits.sql:/docker-entrypoint-initdb.d/05_planner_audits.sql
      - ./db/migrations/006_calendar_poll_schedule.sql:/docker-entrypoint-initdb.d/06_calendar_poll_schedule.sql

volumes:
  timescale_data:
